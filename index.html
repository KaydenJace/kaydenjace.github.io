<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <style>
        body {
            margin: 0;
        } 
        .output {
            width: 100%;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            align-items: center;
        }
        .poke-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 2px solid black;
            width: 200px;
            text-transform: capitalize;
        }
        .poke-types {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px;
            width: 60%;
        }
    </style>
</head>
<body>
    <section class="output"></section>
</body>
<script>
    let arr = []

    const init = () => {
        fetchAllPokemon()
    }

    const fetchAllPokemon = async () => {
        let res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=151&offset=0')
        let data = await res.json()
        console.log(data)
        fetchEachPokemon(data.results)
    }

    const fetchSinglePokemon = async (pokemon) => {
        let res = await fetch(`https://pokeapi.co/api/v2/pokemon/${pokemon}`)
        let data = await res.json()
        return await data
    }

    const fetchEachPokemon = async (pokemon) => {
        const promises = pokemon.map(p => fetchSinglePokemon(p.name));
        arr = await Promise.all(promises);
        console.log(arr);
        showPokemon(arr);
    }

    const showPokemon = (pokemon) => {
        const output = document.querySelector('.output')
        const map = pokemon.map(each => {
            return `
                <div class="poke-card">
                    <h1>${each.name}</h1>
                    <img src="${each.sprites.front_default}" alt="${each.name}"/>
                    <div class="poke-types">
                        <span>${each.types[0].type.name}</span>
                        <span>${each.types.length > 1 ? each.types[1].type.name : ''}</span>
                    </div>
                </div>
            `
        }).join('')
        return output.innerHTML = map
    }

    init()
</script>
</html>
